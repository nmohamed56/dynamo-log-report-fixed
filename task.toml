artifacts = ["/app/report.json"]

[task]
name = "dynamo/log-report"
description = "Parse an Apache-style access log into a deterministic JSON summary report."

[metadata]
category = "data_processing_and_etl"
subcategory = "text_processing"
task_objective = ["transform", "generate"]
artifact_type = ["text_or_log_file", "generated_output_artifact"]
expert_time_estimate_hours = 0.3
model_tested = "GPT-5.4"
agent_tested = "Terminus-2"
difficulty_explanation = "This is an easy task requiring basic text parsing, counting, and JSON serialization."
solution_explanation = "Read each non-empty access-log line, count total requests and distinct client IPs, count request targets, then write the three required values to /app/report.json."
verification_explanation = "Pytest verifies that /app/report.json is valid JSON with exactly the required keys and that each value has the required type and exact value for the provided access log."

[verifier]
timeout_sec = 120.0

[agent]
timeout_sec = 120.0

[environment]
build_timeout_sec = 600.0
cpus = 1
memory_mb = 2048
storage_mb = 10240
gpus = 0
allow_internet = false
mcp_servers = []
